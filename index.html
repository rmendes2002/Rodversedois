<body class="page-home">
    <!-- SVG Filter for Liquid Hover Effect -->
    <svg style="width:0;height:0;position:absolute;z-index:-1;" aria-hidden="true" focusable="false">
        <defs>
            <filter id="liquid-melt">
                <feTurbulence type="fractalNoise" baseFrequency="0.015 0.03" numOctaves="3" result="noise" />
                <feDisplacementMap id="liquid-displacement" in="SourceGraphic" in2="noise" scale="0"
                    xChannelSelector="R" yChannelSelector="G" result="displacement" />
            </filter>
        </defs>
    </svg>

    <!-- Background Video & Image (persistent) -->
    <div class="video-background fixed-bg">
        <video autoplay loop muted playsinline id="bg-video">
            <source src="assets/videos/fundo-rodverse.webm" type="video/webm">
        </video>
        <video autoplay loop muted playsinline id="bg-video-dark" class="bg-video-dark" style="opacity: 0;">
            <source src="assets/videos/fundo-rodverse-noite.webm" type="video/webm">
        </video>
    </div>

    <!-- Persistent Global Overlay -->
    <div class="hero-overlay fixed-overlay"></div>

    <!-- Persistent Navbar (outside Barba container) -->
    <nav class="navbar" id="persistent-navbar">
        <div class="nav-left">
            <a href="index.html" class="logo-link">
                <img src="assets/images/logo.webp" alt="Rodverse Logo" class="logo-img" loading="eager">
            </a>
        </div>

        <div class="nav-center">
            <ul class="nav-links">
                <li><a href="sobre.html" data-i18n="nav_sobre">Sobre</a></li>
                <li><a href="projetos.html" data-i18n="nav_projetos">Projetos</a></li>
                <li><a href="contato.html" data-i18n="nav_contato">Contato</a></li>
            </ul>
        </div>

        <div class="nav-right">

            <!-- Language Toggle -->
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="pt">PT</button>
                <span class="lang-divider">|</span>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>

            <label class="theme-switch" aria-label="Toggle Theme">
                <input type="checkbox" id="theme-toggle-checkbox">
                <span class="theme-slider">
                    <span class="icon sun-icon">☀️</span>
                    <span class="icon moon-icon">🌙</span>
                </span>
            </label>
            <a href="https://wa.me/5521998771912" target="_blank" class="cta-primary">
                Vamos conversar
                <div class="cta-icon-wrapper">
                    <svg class="cta-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 19L19 5M19 5V15.5M19 5H8.5" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
            </a>
            <button class="mobile-menu-toggle" aria-label="Abrir Menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" id="mobileMenu">
        <div class="mobile-menu-content">
            <ul class="mobile-nav-list">
                <li><a href="index.html" class="mobile-nav-item" data-i18n="nav_home">Home</a></li>
                <li><a href="sobre.html" class="mobile-nav-item" data-i18n="nav_sobre">Sobre</a></li>
                <li><a href="projetos.html" class="mobile-nav-item" data-i18n="nav_projetos">Projetos</a></li>
                <li><a href="contato.html" class="mobile-nav-item" data-i18n="nav_contato">Contato</a></li>
            </ul>
        </div>
    </div>

    <!-- Barba.js Wrapper -->
    <div data-barba="wrapper">
        <div data-barba="container" data-barba-namespace="home" class="page-home">
            <section class="hero-section">
                <div class="content-container">
                    <main class="hero-main">
                        <div class="hero-text-content">
                            <h1 class="headline">
                                <span class="headline-line-1" data-i18n="home_headline_1">Testando os novos
                                    limites</span>
                                <span class="headline-line-2" data-i18n="home_headline_2">da criatividade</span>
                            </h1>

                            <p class="subtext" style="display: none;"></p>

                            <button class="cta-secondary">
                                <div class="play-icon-wrapper">
                                    <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path d="M8 5V19L19 12L8 5Z" />
                                    </svg>
                                </div>
                                <span data-i18n="home_reel_btn">Assista ao nosso reel</span>
                            </button>
                        </div>
                    </main>
                </div>
            </section>

            <!-- Video Reel Modal -->
            <div class="reel-modal" id="reelModal">
                <div class="reel-modal-backdrop"></div>
                <div class="reel-modal-content">
                    <button class="reel-modal-close" aria-label="Close Video">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12"></path>
                        </svg>
                    </button>
                    <div class="reel-video-container">
                    </div>
                </div>
            </div>
        </div>
